# ============================================================
# NGiNX — Configuración para Alarma Comunitaria
# Usar en Droplet de DigitalOcean con Nginx como proxy reverso
# 
# Instalación en el droplet:
#   sudo apt install nginx
#   sudo cp nginx.conf /etc/nginx/sites-available/alarmas
#   sudo ln -s /etc/nginx/sites-available/alarmas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d tu-dominio.com
# ============================================================

server {
    listen 80;
    server_name tu-dominio.com;

    # Redirigir HTTP a HTTPS (descomentar después de certbot)
    # return 301 https://$host$request_uri;
}

